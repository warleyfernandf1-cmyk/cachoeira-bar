<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cachoeira Bar — Login</title>
  <link rel="stylesheet" href="static/style.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">🍺 Cachoeira Bar</div>
    <div class="login-sub">Petiscaria &amp; Bar — Sistema Operacional</div>

    <form id="form-login">
      <div class="form-group">
        <label class="form-label">E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com" required autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">Senha</label>
        <input type="password" id="senha" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-primary btn-lg" style="margin-top:.5rem" id="btn-login">Entrar</button>
      <div class="login-err" id="login-err"></div>
    </form>
  </div>
</div>

<script src="static/config.js"></script>
<script src="static/auth.js"></script>
<script>
  // Redireciona se já logado
  if (AUTH.getToken()) redirectByPerfil(AUTH.getUser().perfil);

  function redirectByPerfil(perfil) {
    const mapa = {
      administrador: "/recepcao/",
      recepcionista: "/recepcao/",
      cozinheiro:    "/producao/",
      churrasqueiro: "/producao/",
      garcom:        "/expedicao/",
    };
    window.location.href = mapa[perfil] || "/recepcao/";
  }

  document.getElementById("form-login").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = document.getElementById("btn-login");
    const err = document.getElementById("login-err");
    btn.disabled = true;
    err.textContent = "";
    try {
      const res = await fetch(`${CONFIG.API}/auth/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          email: document.getElementById("email").value.trim(),
          senha: document.getElementById("senha").value,
        }),
      });
      if (!res.ok) {
        const d = await res.json().catch(() => ({}));
        err.textContent = d.detail || "Email ou senha incorretos";
        return;
      }
      const data = await res.json();
      AUTH.save(data.access_token, data.perfil, data.nome);
      redirectByPerfil(data.perfil);
    } catch {
      err.textContent = "Erro de conexão com o servidor";
    } finally {
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
